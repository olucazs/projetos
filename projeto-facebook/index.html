<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login-facebook</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header><!--FORMULARIO-->
        <form class="formulario">
            <h1>Entrar no Facebook</h1>

            <input class="email" type="text" name="email" placeholder="Email ou número de celular" autocomplete="off">

            <input class="senha" type="password" name="senha" placeholder="Senha">

            <input class="entrar" type="submit" value="Entrar">

            <input class="forgot" type="submit" value="Esqueceu a senha?">

            <input class="nova-conta" type="submit" value="Criar Nova Conta">
        </form>
    </header><!--FORMULARIO-->  

    <section>
        <div class="bg">
            
        </div>
    </section>

    <aside>
        <h2>Explore as coisas que <span>você ama</span>.</h2>
    </aside>
</body>
</html>
